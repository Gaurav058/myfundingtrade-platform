worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream web_upstream {
        server web:3000;
    }

    upstream portal_upstream {
        server portal:3000;
    }

    upstream admin_upstream {
        server admin:3000;
    }

    upstream api_upstream {
        server api:4000;
    }

    # ─── Rate limiting zone ──────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ─── Security headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Public Site ─────────────────────────────────────
    server {
        listen 80;
        server_name myfundingtrade.com www.myfundingtrade.com;

        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Trader Portal ───────────────────────────────────
    server {
        listen 80;
        server_name portal.myfundingtrade.com;

        location / {
            proxy_pass http://portal_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Admin Panel ─────────────────────────────────────
    server {
        listen 80;
        server_name admin.myfundingtrade.com;

        location / {
            proxy_pass http://admin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── API ─────────────────────────────────────────────
    server {
        listen 80;
        server_name api.myfundingtrade.com;

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
