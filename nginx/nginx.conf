worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ─────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    server_tokens off;

    # ─── Gzip ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # ─── Upstreams ───────────────────────────────────────
    upstream web_upstream     { server web:3000; }
    upstream portal_upstream  { server portal:3000; }
    upstream admin_upstream   { server admin:3000; }
    upstream api_upstream     { server api:4000; }

    # ─── Rate limiting zones ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ─── Security headers (applied to all servers) ───────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Proxy defaults ─────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # ─── HTTP → HTTPS redirect (production) ──────────────
    server {
        listen 80 default_server;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Public Site ─────────────────────────────────────
    server {
        listen 443 ssl;
        server_name myfundingtrade.com www.myfundingtrade.com;

        ssl_certificate     /etc/letsencrypt/live/myfundingtrade.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myfundingtrade.com/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://web_upstream;
        }

        # Cache static assets
        location /_next/static/ {
            proxy_pass http://web_upstream;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ─── Trader Portal ───────────────────────────────────
    server {
        listen 443 ssl;
        server_name portal.myfundingtrade.com;

        ssl_certificate     /etc/letsencrypt/live/myfundingtrade.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myfundingtrade.com/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://portal_upstream;
        }

        location /_next/static/ {
            proxy_pass http://portal_upstream;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ─── Admin Panel ─────────────────────────────────────
    server {
        listen 443 ssl;
        server_name admin.myfundingtrade.com;

        ssl_certificate     /etc/letsencrypt/live/myfundingtrade.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myfundingtrade.com/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # IP allowlist for admin — uncomment and configure in production
        # allow 1.2.3.4;
        # deny all;

        location / {
            proxy_pass http://admin_upstream;
        }

        location /_next/static/ {
            proxy_pass http://admin_upstream;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ─── API ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.myfundingtrade.com;

        ssl_certificate     /etc/letsencrypt/live/myfundingtrade.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/myfundingtrade.com/privkey.pem;
        include             /etc/nginx/conf.d/ssl-params.conf;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Health check — no rate limit
        location /api/v1/health {
            proxy_pass http://api_upstream;
        }

        # Auth endpoints — tighter rate limit
        location /api/v1/auth {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://api_upstream;
        }

        # Stripe webhooks — no rate limit, larger body
        location /api/v1/webhooks {
            client_max_body_size 5m;
            proxy_pass http://api_upstream;
        }

        # All other API routes
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_upstream;
        }
    }
}
