# Staging nginx config — HTTP only (use Cloudflare or proxy for SSL)
worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream web_upstream     { server web:3000; }
    upstream portal_upstream  { server portal:3000; }
    upstream admin_upstream   { server admin:3000; }
    upstream api_upstream     { server api:4000; }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name staging.myfundingtrade.com;
        location / { proxy_pass http://web_upstream; }
    }

    server {
        listen 80;
        server_name portal.staging.myfundingtrade.com;
        location / { proxy_pass http://portal_upstream; }
    }

    server {
        listen 80;
        server_name admin.staging.myfundingtrade.com;
        location / { proxy_pass http://admin_upstream; }
    }

    server {
        listen 80;
        server_name api.staging.myfundingtrade.com;

        location /api/v1/health { proxy_pass http://api_upstream; }
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_upstream;
        }
    }
}
