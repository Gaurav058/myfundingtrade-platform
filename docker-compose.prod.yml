# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-myfundingtrade}
    ports: []  # Don't expose DB port in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: []  # Don't expose Redis port in production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  api:
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-myfundingtrade}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "127.0.0.1:4000:4000"  # Only localhost — nginx handles external
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  web:
    environment:
      NEXT_PUBLIC_API_URL: https://api.myfundingtrade.com
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  portal:
    environment:
      NEXT_PUBLIC_API_URL: https://api.myfundingtrade.com
    ports:
      - "127.0.0.1:3001:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  admin:
    environment:
      NEXT_PUBLIC_API_URL: https://api.myfundingtrade.com
    ports:
      - "127.0.0.1:3002:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
